<!DOCTYPE html>
<html>
<head>
  <title>Atelier of Normi the Eclectic</title>
  <style>
    body {
      
      background-color: #CC5500;
      color: #CC5500;
      font-family: Georgia, serif;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 40px;
      letter-spacing: 2px;
    }

    p {
      font-size: 18px;
      max-width: 600px;
      margin: auto;
    }

    .gallery {
      margin-top: 50px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
    }

    .gallery img {
      width: 100%;
      border-radius: 12px;
      transition: 0.4s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <h1>Atelier of Normi the Eclectic</h1>

  <p>
    Curated fragments of a mind that does not settle.
    Each piece exists somewhere between chaos and intention—
    where meaning is felt before it is understood.
  </p>
